name: Build OpenWrt luci-app-geph5 Package

# 触发条件：当你推送代码到 main 分支，或者在网页上手动点击运行
on:
  push:
    branches:
      - main
    tags:
      - 'v*' # 当你打 v0.99.1 这种 tag 时也会触发
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # 【改造点 1：动态 Job 名称，方便在 Actions 面板区分】
    name: Build ${{ matrix.arch }} (${{ matrix.os_ver }})
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      fail-fast: false # 极其重要：如果 25.x 的 apk 编译报错，不会连累 24.x 的 ipk 被强制取消
      matrix:
        include:
          # ==========================================
          # 路线 A：传统 IPK 环境 (OpenWrt 24.10.4)
          # ==========================================
          - arch: x86_64
            os_ver: 24.10.4
            pkg_ext: ipk
            sdk_url: https://downloads.openwrt.org/releases/24.10.4/targets/x86/64/openwrt-sdk-24.10.4-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            rust_target: x86_64-unknown-linux-musl

          - arch: aarch64_generic
            os_ver: 24.10.4
            pkg_ext: ipk
            sdk_url: https://downloads.openwrt.org/releases/24.10.4/targets/armsr/armv8/openwrt-sdk-24.10.4-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            rust_target: aarch64-unknown-linux-musl

          # ==========================================
          # 路线 B：全新 APK 环境 (OpenWrt 25.12.4)
          # ==========================================
          - arch: x86_64
            os_ver: 25.12.4
            pkg_ext: apk
            sdk_url: https://downloads.openwrt.org/releases/25.12.4/targets/x86/64/openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            rust_target: x86_64-unknown-linux-musl

          - arch: aarch64_generic
            os_ver: 25.12.4
            pkg_ext: apk
            sdk_url: https://downloads.openwrt.org/releases/25.12.4/targets/armsr/armv8/openwrt-sdk-25.12.4-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            rust_target: aarch64-unknown-linux-musl

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Debian/Ubuntu Build Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget zstd

      - name: 🦀 Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: 📦 Download and Prepare OpenWrt SDK
        run: |
          curl -fsSL -o sdk.tar.zst ${{ matrix.sdk_url }}

          echo "✅ SDK 下载完成，开始解压..."
          mkdir openwrt-sdk
          tar -xf sdk.tar.zst -C openwrt-sdk --strip-components=1

          echo "✅ SDK 解压完成，开始同步代码..."
          mkdir -p openwrt-sdk/package/luci-app-geph5

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='openwrt-sdk' \
            --exclude='sdk.tar.zst' \
            ./ openwrt-sdk/package/luci-app-geph5/

          echo "✅ 代码准备就绪。"

      - name: 🔧 Patch Makefile for Cross-Compilation
        run: |
          sed -i "s/x86_64-unknown-linux-musl/${{ matrix.rust_target }}/g" openwrt-sdk/package/luci-app-geph5/Makefile

      - name: 🚀 Compile luci-app-geph5 Package
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/luci-app-geph5/compile V=s

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          # 【改造点 2：动态命名 Artifact，防止不同系统版本的产物互相覆盖】
          name: luci-app-geph5-${{ matrix.os_ver }}-${{ matrix.arch }}-${{ matrix.pkg_ext }}
          path: openwrt-sdk/bin/packages/**/luci-app-geph5*.${{ matrix.pkg_ext }}
          if-no-files-found: error

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          # 【改造点 3：Release 环节同时抓取 .ipk 和 .apk 文件】
          files: |
            openwrt-sdk/bin/packages/**/luci-app-geph5*.ipk
            openwrt-sdk/bin/packages/**/luci-app-geph5*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}