name: Build OpenWrt luci-app-GEPH5 Package

# 触发条件：当你推送代码到 main 分支，或者在网页上手动点击运行
on:
  push:
    branches:
      - main
    tags:
      - 'v*' # 当你打 v0.99.1 这种 tag 时也会触发
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false # 如果某个架构编译失败，不要取消其他架构的编译
      matrix:
        # 定义需要编译的架构、对应的 SDK 下载链接以及 Rust Target
        include:
          - arch: x86_64
            sdk_url: https://downloads.openwrt.org/releases/24.10.4/targets/x86/64/openwrt-sdk-24.10.4-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            rust_target: x86_64-unknown-linux-musl

          - arch: aarch64
            sdk_url: https://downloads.openwrt.org/releases/24.10.4/targets/armsr/armv8/openwrt-sdk-24.10.4-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            rust_target: aarch64-unknown-linux-musl

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Debian/Ubuntu Build Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          # 加上了 zstd
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget zstd

      - name: 🦀 Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: 📦 Download and Prepare OpenWrt SDK
        run: |
          # 使用 curl 进行静默下载
          # -f: 遇到服务器错误时不输出 HTML 错误页
          # -s: 静默模式，不显示进度条（减少日志量）
          # -S: 如果出错，依然显示错误信息
          # -L: 自动跟随重定向（GitHub 和 OpenWrt 镜像站经常有重定向）
          curl -fsSL -o sdk.tar.zst ${{ matrix.sdk_url }}

          echo "✅ SDK 下载完成，开始解压..."
          mkdir openwrt-sdk
          tar -xf sdk.tar.zst -C openwrt-sdk --strip-components=1

          echo "✅ SDK 解压完成，开始同步代码..."
          mkdir -p openwrt-sdk/package/luci-app-GEPH5

          # 极其重要：添加 --exclude 排除掉 sdk 文件夹本身
          # 否则 rsync 会尝试把几 GB 的 sdk 文件夹再次拷贝进它自己内部，导致死循环
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='openwrt-sdk' \
            --exclude='sdk.tar.zst' \
            ./ openwrt-sdk/package/luci-app-GEPH5/

          echo "✅ 代码准备就绪。"

      - name: 🔧 Patch Makefile for Cross-Compilation
        run: |
          # 这样会把 Makefile 里所有的 target 字符串都替换掉
          sed -i "s/x86_64-unknown-linux-musl/${{ matrix.rust_target }}/g" openwrt-sdk/package/luci-app-GEPH5/Makefile

      - name: 🚀 Compile luci-app-GEPH5 Package
        working-directory: openwrt-sdk
        run: |
          # 1. 更新所有 feed
          ./scripts/feeds update -a

          # 2. 安装所有 feed 里的包到 package/feeds 目录下
          # 这样编译系统就能自动找到 liblua、lucihttp 等所有依赖
          ./scripts/feeds install -a

          # 3. 生成默认配置（这一步会根据你的 Makefile 自动选中依赖）
          make defconfig

          # 4. 启动编译
          # 如果还是报错，可以尝试先单独编译依赖：make package/feeds/luci/lucihttp/compile V=s
          make package/luci-app-GEPH5/compile V=s

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-GEPH5-Package-${{ matrix.arch }}
          # 匹配所有以 luci-app-GEPH5_ 开头的包文件，无论是 .ipk 还是 .apk
          path: openwrt-sdk/bin/packages/**/luci-app-GEPH5_*
          if-no-files-found: error
